name: Main workflow ms-sessions

permissions:
    contents: write 

on:
  pull_request:
    branches:
       - main 
    paths:
      - "apps/ms-sessions/**"

jobs:
    ms_sessions-linter-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"  
        - name: Install pnpm
          run: npm install -g pnpm  
        - name: Install dependencies
          run: pnpm install
          working-directory: ./apps/ms-sessions  
        - name: Lint
          run: pnpm run lint
          working-directory: ./apps/ms-sessions

    ms_sessions-build-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
          working-directory: ./apps/ms-sessions
        - name: Build
          run: pnpm run build
          working-directory: ./apps/ms-sessions   
        
    ms_sessions-jest-test:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./apps/ms-sessions 
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4 
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
        - name: Run unit tests
          run: pnpm test

    build-and-push:
      runs-on: ubuntu-latest
      needs: [ms_sessions-build-test,ms_sessions-jest-test,ms_sessions-linter-test]
      permissions:
        contents: read
        packages: write
      steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
  
      # Get the short commit hash
      - name: Get short commit hash
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
  
      # Log in to GitHub Docker Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r '.version' ./apps/ms-sessions/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Image version: $VERSION"

      # Build the Docker image
      - name: Build Docker image 
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          REF_NAME=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')
  
          IMAGE_TAG="${REF_NAME}"
  
          docker build . \
              --file ./apps/ms-sessions/Dockerfile \
              --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-sessions:${VERSION}
  
          docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-sessions:${VERSION} \
              ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-sessions:latest
  
      # Push the Docker image to GitHub Container Registry
      - name: Push Docker image
        run: |
          # Lowercase repository owner and name
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
  
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-sessions:${VERSION}
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-sessions:latest
