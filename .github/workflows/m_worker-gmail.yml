name: Main workflow worker-gmail

permissions:
    contents: write

on:
  pull_request:
    branches:
       - main
    paths:
      - "apps/worker-gmail/**"

jobs:
    worker_gmail-linter-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install
          working-directory: ./apps/worker-gmail
        - name: Lint
          run: pnpm run lint
          working-directory: ./apps/worker-gmail

    worker_gmail-build-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
          working-directory: ./apps/worker-gmail
        - name: Build
          run: pnpm run build
          working-directory: ./apps/worker-gmail

    worker_gmail-jest-test:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./apps/worker-gmail
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
        - name: Run unit tests
          run: pnpm test

    check_if_version_exists:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      steps:

        - name: Checkout code
          uses: actions/checkout@v4

        - name: Read version from package.json
          id: pkg
          run: |
            VERSION=$(jq -r '.version' ./apps/worker-gmail/package.json)
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Image version: $VERSION"

        - name: Check if Docker image version exists
          id: check_version
          run: |
            IMAGE_NAME="ghcr.io/mehdilazaar/cinepotes/worker-gmail"

            echo "Checking for ${IMAGE_NAME}:${VERSION}..."

            if docker manifest inspect ${IMAGE_NAME}:${VERSION} > /dev/null 2>&1; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "❌ Image ${IMAGE_NAME}:${VERSION} already exists"
              echo "Cancelling workflow as this version is already published"
              exit 1
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "✅ Image ${IMAGE_NAME}:${VERSION} does not exist - new version!"
            fi

        - name: Continue with new version
          if: steps.check_version.outputs.exists == 'false'
          run: |
            echo "This is a new version, continuing workflow..."


    build-and-push:
      runs-on: ubuntu-latest
      needs: [worker_gmail-build-test,worker_gmail-jest-test,worker_gmail-linter-test,check_if_version_exists]
      permissions:
        contents: read
        packages: write
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short commit hash
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r '.version' ./apps/worker-gmail/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Image version: $VERSION"

      - name: Build Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker build ./apps/worker-gmail \
              --file ./apps/worker-gmail/Dockerfile \
              --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/worker-gmail:${VERSION}

          docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/worker-gmail:${VERSION} \
              ghcr.io/${REPO_OWNER}/${REPO_NAME}/worker-gmail:latest

      - name: Push Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/worker-gmail:${VERSION}
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/worker-gmail:latest
