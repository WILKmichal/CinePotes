name: Main workflow ms-library

permissions:
    contents: write

on:
  pull_request:
    branches: 
       - main 
    paths:
      - "apps/ms-library/**"

jobs:
    ms_library-linter-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"  
        - name: Install pnpm
          run: npm install -g pnpm  
        - name: Install dependencies
          run: pnpm install
          working-directory: ./apps/ms-library  
        - name: Lint
          run: pnpm run lint
          working-directory: ./apps/ms-library

    ms_library-build-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
          working-directory: ./apps/ms-library
        - name: Build
          run: pnpm run build
          working-directory: ./apps/ms-library   
        
    ms_library-jest-test:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./apps/ms-library 
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4 
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
        - name: Run unit tests
          run: pnpm test

    build-and-push:
      runs-on: ubuntu-latest
      needs: [ms_library-build-test,ms_library-jest-test,ms_library-linter-test]
      permissions:
        contents: read
        packages: write
      steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
  
      # Get the short commit hash
      - name: Get short commit hash
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
  
      # Log in to GitHub Docker Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r '.version' ./apps/ms-library/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Image version: $VERSION"

      # Build the Docker image
      - name: Build Docker image 
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          REF_NAME=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')
  
          IMAGE_TAG="${REF_NAME}"
  
          docker build ./apps/ms-library \
              --file ./apps/ms-library/Dockerfile \
              --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-library:${VERSION}
  
          docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-library:${VERSION} \
              ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-library:latest
  
      # Push the Docker image to GitHub Container Registry
      - name: Push Docker image
        run: |
          # Lowercase repository owner and name
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
  
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-library:${VERSION}
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-library:latest


        


