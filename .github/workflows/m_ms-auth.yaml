name: Main workflow ms-auth

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/ms-auth/**"

jobs:
  ms_auth-linter-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        working-directory: ./apps/ms-auth

      - name: Lint
        run: pnpm run lint
        working-directory: ./apps/ms-auth

  ms_auth-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./apps/ms-auth

      - name: Build
        run: pnpm run build
        working-directory: ./apps/ms-auth

  ms_auth-jest-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/ms-auth

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [ms_auth-build-test, ms_auth-jest-test, ms_auth-linter-test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        run: |
          VERSION=$(jq -r '.version' ./apps/ms-auth/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker build ./apps/ms-auth \
            --file ./apps/ms-auth/Dockerfile \
            --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:${VERSION}

          docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:${VERSION} \
            ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:latest

      - name: Push Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:${VERSION}
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:latest