name: Main workflow ms-notif

permissions:
    contents: write

on:
  pull_request:
    branches:
       - main
    paths:
      - "apps/ms-notif/**"

jobs:
    ms_notif-linter-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install
          working-directory: ./apps/ms-notif
        - name: Lint
          run: pnpm run lint
          working-directory: ./apps/ms-notif

    ms_notif-build-test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
          working-directory: ./apps/ms-notif
        - name: Build
          run: pnpm run build
          working-directory: ./apps/ms-notif

    ms_notif-jest-test:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./apps/ms-notif
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
        - name: Run unit tests
          run: pnpm test

    check_if_version_exists:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      steps:

        - name: Checkout code
          uses: actions/checkout@v4

        - name: Read version from package.json
          id: pkg
          run: |
            VERSION=$(jq -r '.version' ./apps/ms-notif/package.json)
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Image version: $VERSION"

        - name: Check if Docker image version exists
          id: check_version
          run: |
            IMAGE_NAME="ghcr.io/mehdilazaar/cinepotes/ms-notif"

            echo "Checking for ${IMAGE_NAME}:${VERSION}..."

            if docker manifest inspect ${IMAGE_NAME}:${VERSION} > /dev/null 2>&1; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "❌ Image ${IMAGE_NAME}:${VERSION} already exists"
              echo "Cancelling workflow as this version is already published"
              exit 1
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "✅ Image ${IMAGE_NAME}:${VERSION} does not exist - new version!"
            fi

        - name: Continue with new version
          if: steps.check_version.outputs.exists == 'false'
          run: |
            echo "This is a new version, continuing workflow..."


    build-and-push:
      runs-on: ubuntu-latest
      needs: [ms_notif-build-test,ms_notif-jest-test,ms_notif-linter-test,check_if_version_exists]
      permissions:
        contents: read
        packages: write
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short commit hash
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r '.version' ./apps/ms-notif/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Image version: $VERSION"

      - name: Build Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker build ./apps/ms-notif \
              --file ./apps/ms-notif/Dockerfile \
              --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-notif:${VERSION}

          docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-notif:${VERSION} \
              ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-notif:latest

      - name: Push Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-notif:${VERSION}
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-notif:latest
