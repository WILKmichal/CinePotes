name: Main workflow ms-auth

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/ms-auth/**"

jobs:
  commit-lint:
    name: Verify conventional Commits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  ms_auth-linter-test:
    runs-on: ubuntu-latest
    needs: commit-lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (root)
        run: pnpm install --frozen-lockfile

      - name: Lint ms-auth
        run: pnpm --filter ms-auth lint

  ms_auth-build-test:
    runs-on: ubuntu-latest
    needs: commit-lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (root)
        run: pnpm install --frozen-lockfile

      - name: Build ms-auth
        run: pnpm --filter ms-auth build

  ms_auth-jest-test:
    runs-on: ubuntu-latest
    needs: commit-lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (root)
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter ms-auth test

  check_if_version_exists:
    runs-on: ubuntu-latest
    needs: [ms_auth-build-test, ms_auth-jest-test, ms_auth-linter-test]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        run: |
          VERSION=$(jq -r '.version' ./apps/ms-auth/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Image version: $VERSION"

      - name: Check if Docker image version exists
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${GITHUB_REPOSITORY#*/}/ms-auth"

          if docker manifest inspect ${IMAGE_NAME}:${VERSION} > /dev/null 2>&1; then
            echo "❌ Image already exists"
            exit 1
          else
            echo "✅ New version"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: check_if_version_exists
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        run: |
          VERSION=$(jq -r '.version' ./apps/ms-auth/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker build ./apps/ms-auth \
            --file ./apps/ms-auth/Dockerfile \
            --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:${VERSION}

          docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:${VERSION} \
            ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:latest

      - name: Push Docker image
        run: |
          REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')

          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:${VERSION}
          docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}/ms-auth:latest